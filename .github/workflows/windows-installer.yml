name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "requirements.txt"
      - "installer/**"
      - ".github/workflows/windows-installer.yml"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --windowed --name PDFReaderSigner --collect-all pyhanko --collect-all pyhanko_certvalidator src\pdf_reader_app.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Setup.exe
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\PDFReaderSigner.iss

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDFReaderSigner-Windows
          path: |
            dist\PDFReaderSigner\**
            installer-output\PDFReaderSigner-Setup.exe
